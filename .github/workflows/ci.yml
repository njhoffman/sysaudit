name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: lint + test + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      # gofmt -l prints filenames of files that would change. Empty output
      # means everything is already formatted.
      - name: Verify gofmt
        run: |
          out=$(gofmt -s -l .)
          if [ -n "$out" ]; then
            echo "::error::Files need gofmt -s -w:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      # Pinned to match the local toolchain. golangci-lint-action v7+ is
      # required for golangci-lint v2.x; v6 errors with "invalid version".
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

      - name: Test (race, single run)
        run: make test

      - name: Build
        run: make build

      # Catches Markdown source regressions in man/sysaudit.1.md by
      # rendering the .1 file. Doesn't publish the artifact.
      - name: Render manpage
        run: make manpage
